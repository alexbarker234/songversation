name: Source Code Check

on:
  - push

jobs:
  tsc:
    name: Run Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "frontend"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: "Setup and run typecheck"
        run: |
          npm i
          npm run typecheck
